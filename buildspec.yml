version: 0.2

phases:
    install:
        commands:
            - echo Installing Maven...
            - mvn --version

    pre_build:
        commands:
            - echo Starting build...

    build:
        commands:
            - echo Building Spring Boot application...
            - mvn clean package -DskipTests

    post_build:
        commands:
            - echo Build completed successfully!

artifacts:
    files:
        - target/aws-app.jar
